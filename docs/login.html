<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to your Humsafar account to find your perfect life partner.">
    <title>Login — Humsafar</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body class="auth-page">
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="assets/logo.png" alt="Humsafar Logo" class="logo-img">
                <span>Humsafar</span>
            </a>
            <div class="nav-actions">
                <a href="signup.html" class="btn-signup">SIGN UP</a>
            </div>
        </div>
    </nav>

    <main class="auth-main">
        <div class="auth-container">
            <div class="auth-card" id="login-card">
                <div class="auth-header">
                    <img src="assets/logo.png" alt="Humsafar" class="auth-logo">
                    <h1>Welcome Back</h1>
                    <p>Login to continue your journey</p>
                </div>

                <form id="login-form" class="auth-form">
                    <div class="form-group">
                        <label for="login-email">Email Address</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="3">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                                <polyline points="22,6 12,13 2,6" />
                            </svg>
                            <input type="email" id="login-email" name="email" placeholder="Enter your email" required
                                autocomplete="email">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.5">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                            </svg>
                            <input type="password" id="login-password" name="password" placeholder="Enter your password"
                                required autocomplete="current-password">
                            <button type="button" class="toggle-password" data-target="login-password"
                                aria-label="Toggle password">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="form-error" id="login-error"></div>

                    <button type="submit" class="btn btn-primary btn-full" id="login-submit">
                        <span class="btn-text">LOGIN</span>
                        <span class="btn-loader" style="display:none;"></span>
                    </button>
                </form>

                <div class="auth-footer">
                    <p>Don't have an account? <a href="signup.html">Create Profile</a></p>
                    <p class="auth-divider-text">or</p>
                    <a href="admin-login.html" class="admin-link">Login as Admin →</a>
                </div>
            </div>
        </div>

        <!-- Decorative Background -->
        <div class="auth-bg-deco">
            <div class="deco-blob deco-blob-1"></div>
            <div class="deco-blob deco-blob-2"></div>
        </div>
    </main>

    <script src="js/auth.js"></script>
</body>

</html>
