<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Humsafar Admin Dashboard — Manage users and platform statistics.">
    <title>Admin Dashboard — Humsafar</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page dashboard-page">
    <!-- NAVBAR -->
    <nav class="navbar navbar-admin">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="assets/logo.png" alt="Humsafar Logo" class="logo-img">
                <span>Humsafar</span>
                <span class="admin-tag">ADMIN</span>
            </a>
            <div class="nav-actions">
                <button class="btn-logout" id="admin-logout-btn">LOGOUT</button>
            </div>
        </div>
    </nav>

    <main class="dashboard-main">
        <div class="dashboard-container">
            <!-- Dashboard Header -->
            <div class="dashboard-header">
                <h1>Admin Dashboard</h1>
                <p>Platform overview and user management</p>
            </div>

            <!-- Stats Cards -->
            <div class="dashboard-stats" id="dashboard-stats">
                <div class="dash-stat-card">
                    <div class="dash-stat-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    </div>
                    <div class="dash-stat-info">
                        <span class="dash-stat-number" id="dash-total-users">0</span>
                        <span class="dash-stat-label">Total Registered Users</span>
                    </div>
                </div>
                <div class="dash-stat-card">
                    <div class="dash-stat-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    </div>
                    <div class="dash-stat-info">
                        <span class="dash-stat-number" id="dash-verified">18,000+</span>
                        <span class="dash-stat-label">Verified Profiles</span>
                    </div>
                </div>
                <div class="dash-stat-card">
                    <div class="dash-stat-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    </div>
                    <div class="dash-stat-info">
                        <span class="dash-stat-number" id="dash-matches">12,500+</span>
                        <span class="dash-stat-label">Successful Matches</span>
                    </div>
                </div>
                <div class="dash-stat-card">
                    <div class="dash-stat-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    </div>
                    <div class="dash-stat-info">
                        <span class="dash-stat-number">95%</span>
                        <span class="dash-stat-label">Satisfaction Rate</span>
                    </div>
                </div>
            </div>

            <!-- Users Table -->
            <div class="dashboard-section">
                <div class="section-header-row">
                    <h2>Registered Users</h2>
                    <span class="user-count-badge" id="user-count-badge">0 users</span>
                </div>
                <div class="table-wrapper">
                    <table class="users-table" id="users-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Full Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Gender</th>
                                <th>City</th>
                                <th>Joined</th>
                            </tr>
                        </thead>
                        <tbody id="users-tbody">
                            <tr class="empty-row">
                                <td colspan="7">Loading users...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="js/admin.js"></script>
</body>
</html>
