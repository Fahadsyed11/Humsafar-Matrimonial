<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your Humsafar profile and start finding your perfect life partner today.">
    <title>Sign Up — Humsafar</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="assets/logo.png" alt="Humsafar Logo" class="logo-img">
                <span>Humsafar</span>
            </a>
            <div class="nav-actions">
                <a href="login.html" class="btn-login">LOGIN</a>
            </div>
        </div>
    </nav>

    <main class="auth-main">
        <div class="auth-container">
            <div class="auth-card auth-card-wide" id="signup-card">
                <div class="auth-header">
                    <img src="assets/logo.png" alt="Humsafar" class="auth-logo">
                    <h1>Create Your Profile</h1>
                    <p>Begin your journey to finding the perfect match</p>
                </div>

                <form id="signup-form" class="auth-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="signup-name">Full Name <span class="required">*</span></label>
                            <div class="input-wrapper">
                                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                <input type="text" id="signup-name" name="fullName" placeholder="Your full name" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="signup-email">Email Address <span class="required">*</span></label>
                            <div class="input-wrapper">
                                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                                <input type="email" id="signup-email" name="email" placeholder="your@email.com" required autocomplete="email">
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="signup-password">Password <span class="required">*</span></label>
                            <div class="input-wrapper">
                                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                                <input type="password" id="signup-password" name="password" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
                                <button type="button" class="toggle-password" data-target="signup-password" aria-label="Toggle password">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                </button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="signup-confirm">Confirm Password <span class="required">*</span></label>
                            <div class="input-wrapper">
                                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                                <input type="password" id="signup-confirm" name="confirmPassword" placeholder="Repeat password" required minlength="6" autocomplete="new-password">
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="signup-phone">Phone Number</label>
                            <div class="input-wrapper">
                                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                                <input type="tel" id="signup-phone" name="phone" placeholder="+92 300 1234567">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="signup-gender">Gender</label>
                            <div class="input-wrapper select-wrapper">
                                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                <select id="signup-gender" name="gender">
                                    <option value="">Select Gender</option>
                                    <option value="male">Male</option>
                                    <option value="female">Female</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="signup-dob">Date of Birth</label>
                            <div class="input-wrapper">
                                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                                <input type="date" id="signup-dob" name="dob">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="signup-city">City</label>
                            <div class="input-wrapper">
                                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                                <input type="text" id="signup-city" name="city" placeholder="Your city">
                            </div>
                        </div>
                    </div>

                    <!-- Terms & Conditions Checkbox -->
                    <div class="form-group terms-group">
                        <label class="checkbox-label" for="signup-terms">
                            <input type="checkbox" id="signup-terms" name="agreedToTerms" required>
                            <span class="checkmark"></span>
                            <span class="checkbox-text">
                                I agree to the <a href="terms.html" target="_blank" class="terms-link">Terms & Conditions</a>
                            </span>
                        </label>
                    </div>

                    <div class="form-error" id="signup-error"></div>
                    <div class="form-success" id="signup-success"></div>

                    <button type="submit" class="btn btn-primary btn-full" id="signup-submit" disabled>
                        <span class="btn-text">CREATE PROFILE</span>
                        <span class="btn-loader" style="display:none;"></span>
                    </button>
                </form>

                <div class="auth-footer">
                    <p>Already have an account? <a href="login.html">Login here</a></p>
                </div>
            </div>
        </div>

        <!-- Decorative Background -->
        <div class="auth-bg-deco">
            <div class="deco-blob deco-blob-1"></div>
            <div class="deco-blob deco-blob-2"></div>
        </div>
    </main>

    <script src="js/auth.js"></script>
</body>
</html>
